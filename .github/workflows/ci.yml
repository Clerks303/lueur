name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # TODO: remove once upstream actions migrate off Node 20 (~Q3 2026).
  # Silences the Node 20 deprecation notice on the JS actions we use today.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  check:
    name: Typecheck + tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Check OpenAPI spec is up to date
        env:
          # Dummy values so loadEnv() passes during the module import that
          # happens when generating the spec. No real DB / S3 is contacted.
          DATABASE_URL: postgres://dummy:dummy@localhost:1/dummy
          BETTER_AUTH_SECRET: ci-openapi-secret-000000000000000000000000
          S3_ACCESS_KEY_ID: dummy
          S3_SECRET_ACCESS_KEY: dummy
        run: |
          pnpm api:openapi
          if ! git diff --exit-code packages/shared-types/openapi.json; then
            echo "::error::OpenAPI spec is stale. Run 'pnpm api:openapi' locally and commit the updated file."
            exit 1
          fi
